on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions4git/setup-git@v1
      
      - name: Do bump
        id: bump
        run: |
          last_tag="$(git describe --tags "$(git rev-list --tags --max-count=1)")"
          commit_messages="$(git log --pretty=format:'%s' "$last_tag"..HEAD | tr '[:upper:]' '[:lower:]')"
          bump_type="patch"
          if [[ $commit_messages == *"minor"* ]]; then
            bump_type="minor"
          fi
          if [[ $commit_messages == *"major"* ]]; then
            bump_type="major"
          fi

          python -m pip install --upgrade bump-my-version
          bump-my-version bump "$bump_type" -vv

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          branch: ${{ github.head_ref || github.ref_name }}
          tags: true
          force: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Publish
        run: |
          bun pm pack
          bunx npm publish --access public ./makeshift27015-eslint-config-*.tgz --provenance
